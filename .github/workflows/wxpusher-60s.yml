name: wxpusher-60s

on:
  schedule:
    # UTC 02:00 = Asia/Shanghai 10:00
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  push-news:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # setup-node@v5 默认 package-manager-cache: true，会读 package.json 的 packageManager(pnpm) 并调用 pnpm；
      # 本 job 不装依赖，必须显式关闭，否则会报「找不到 pnpm」。
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Push 60s news to WxPusher
        env:
          NEWS_API_BASE: ${{ secrets.NEWS_API_BASE }}
          WXPUSHER_APP_TOKEN: ${{ secrets.WXPUSHER_APP_TOKEN }}
          WXPUSHER_UIDS: ${{ secrets.WXPUSHER_UIDS }}
          WXPUSHER_TOPIC_IDS: ${{ secrets.WXPUSHER_TOPIC_IDS }}
        run: node scripts/push-wxpusher.mjs

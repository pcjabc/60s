name: wxpusher-60s

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  push-news:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Push 60s news to WxPusher
        env:
          NEWS_API_BASE: ${{ secrets.NEWS_API_BASE }}
          WXPUSHER_APP_TOKEN: ${{ secrets.WXPUSHER_APP_TOKEN }}
          WXPUSHER_UIDS: ${{ secrets.WXPUSHER_UIDS }}
          WXPUSHER_TOPIC_IDS: ${{ secrets.WXPUSHER_TOPIC_IDS }}
        run: node scripts/push-wxpusher.mjs

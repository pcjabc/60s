name: wxpusher-60s

on:
  schedule:
    # UTC 02:00 = Asia/Shanghai 10:00
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  push-news:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # 仓库 package.json 含 "packageManager": "pnpm@..." 时，setup-node 会走 pnpm/Corepack；
      # 本 job 只跑脚本、不装依赖，禁用 Corepack 避免误找 pnpm。
      - name: Disable Corepack for this job
        run: corepack disable || true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Push 60s news to WxPusher
        env:
          NEWS_API_BASE: ${{ secrets.NEWS_API_BASE }}
          WXPUSHER_APP_TOKEN: ${{ secrets.WXPUSHER_APP_TOKEN }}
          WXPUSHER_UIDS: ${{ secrets.WXPUSHER_UIDS }}
          WXPUSHER_TOPIC_IDS: ${{ secrets.WXPUSHER_TOPIC_IDS }}
        run: node scripts/push-wxpusher.mjs
